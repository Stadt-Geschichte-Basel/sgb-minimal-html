[project]
name = "sgb-html"
version = "0.1.0"
description = "Minimal text-only HTML chapter editions for Stadt.Geschichte.Basel, generated from the chapter PDFs and published to Open Monograph Press"
authors = [
    { name = "Moritz Mähr", email = "14755525+maehr@users.noreply.github.com" }
]
license = "AGPL-3.0-only"
requires-python = ">=3.12"
dependencies = [
    "httpx2>=2.5.0",
    "pydantic>=2.13.4",
    "pydantic-settings>=2.14.2",
    "pymupdf>=1.28.0",
    "structlog>=26.1.0",
    "typer>=0.26.8",
]

[build-system]
requires = ["uv_build>=0.11.26,<0.12.0"]
build-backend = "uv_build"

[dependency-groups]
dev = [
    "pytest>=9.1.1",
    "pytest-cov>=7.1.0",
    "ruff>=0.15.20",
    "ty==0.0.56",
]

[project.scripts]
sgb-html = "sgb_html.cli:app"

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B", "SIM", "RUF"]
# German book text: en dashes, guillemets, and soft hyphens are intentional.
ignore = ["RUF001", "RUF002", "RUF003"]

[tool.pytest.ini_options]
testpaths = ["tests", "src"]
addopts = "--doctest-modules"

[tool.coverage.run]
source = ["sgb_html"]

[tool.coverage.report]
include = ["*/sgb_html/extract.py", "*/sgb_html/render.py"]
fail_under = 100
show_missing = true
